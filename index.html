<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="Container">
        <div class="login-box">
            <h1>Bem Vindo</h1>
            <h2>Login</h2>

            <input class="input-email" type="email" placeholder="Digite seu email">
            <input class="input-password" type="password" placeholder="Digite sua senha">

            <button class="Entrar" onclick="window.location.href='entrar.html'">Entrar</button>
            <label class="label-cadastro"><abbr title="Não tem uma conta?">Não</abbr> tem uma conta? <a href="cadastro.html">Cadastre-se</a></label>
        </div>
    </div>

</body>
</html>
